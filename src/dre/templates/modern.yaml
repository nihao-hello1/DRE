# ============================================================================
# 模板：现代风格 — 微软雅黑 + 清爽排版
# 适用：科技公司文档、屏幕阅读为主的文档
# ============================================================================
name: "现代"
description: "现代清爽风格。微软雅黑正文 + 大字标题 + 无缩进，适合科技公司/屏幕阅读"

page:
  size: A4
  orientation: portrait
  margins:
    top: "2.54cm"
    bottom: "2.54cm"
    left: "3.17cm"
    right: "3.17cm"

styles:
  heading1:
    font_name: "Microsoft YaHei"
    font_size: "18pt"
    bold: true
    color: "000000"
    alignment: left
    space_before: "18pt"
    space_after: "10pt"
    line_spacing: 1.3
    outline_level: 1
    keep_with_next: true

  heading2:
    font_name: "Microsoft YaHei"
    font_size: "16pt"
    bold: true
    color: "000000"
    alignment: left
    space_before: "12pt"
    space_after: "8pt"
    line_spacing: 1.3
    outline_level: 2
    keep_with_next: true

  heading3:
    font_name: "Microsoft YaHei"
    font_size: "14pt"
    bold: true
    color: "000000"
    alignment: left
    space_before: "10pt"
    space_after: "6pt"
    line_spacing: 1.3
    outline_level: 3
    keep_with_next: true

  heading4:
    font_name: "Microsoft YaHei"
    font_size: "12pt"
    bold: true
    color: "333333"
    alignment: left
    space_before: "8pt"
    space_after: "4pt"
    line_spacing: 1.3
    outline_level: 4
    keep_with_next: true

  body:
    font_name: "Microsoft YaHei"
    font_size: "11pt"
    bold: false
    color: "333333"
    alignment: justify
    space_before: "0pt"
    space_after: "4pt"
    line_spacing: 1.3
    first_line_indent: "0cm"

  list_item:
    font_name: "Microsoft YaHei"
    font_size: "11pt"
    bold: false
    color: "333333"
    alignment: left
    space_before: "2pt"
    space_after: "2pt"
    line_spacing: 1.3

  code_block:
    font_name: "Consolas"
    font_size: "10pt"
    bold: false
    color: "1E1E1E"
    alignment: left
    space_before: "6pt"
    space_after: "6pt"
    line_spacing: 1.2

  blockquote:
    font_name: "Microsoft YaHei"
    font_size: "10.5pt"
    italic: true
    color: "888888"
    alignment: left
    space_before: "6pt"
    space_after: "6pt"
    line_spacing: 1.3
    left_indent: "0.8cm"

  caption:
    font_name: "Microsoft YaHei"
    font_size: "10pt"
    bold: false
    color: "666666"
    alignment: center
    space_before: "4pt"
    space_after: "6pt"
    line_spacing: 1.1

table:
  font_name: "Microsoft YaHei"
  font_size: "10pt"
  header_bg: "4874CB"
  header_font_color: "FFFFFF"
  header_bold: true
  row_alt_color: "F5F7FA"
  border_color: "D0D5DD"

toc:
  title: "Contents"
  title_font_name: "Microsoft YaHei"
  title_font_size: "18pt"
  levels: 3
